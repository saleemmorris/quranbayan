<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .cls-1 { fill: #3e4a2e; } /* Olive (Primary) */
      .cls-2 { fill: #d2b48c; } /* Clay (Accent) */
      .dark .cls-1 { fill: #c5d1af; } /* Sage (Dark Mode Primary) */
      .dark .cls-2 { fill: #4b3b2f; } /* Earth (Dark Mode Accent) */
    </style>
  </defs>
  
  <g transform="translate(10, 45)">
    <text font-family="Geist, ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="700" class="cls-1" letter-spacing="-1">
      quran
    </text>
    
    <text x="96" font-family="Geist, ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="300" class="cls-2" letter-spacing="-1">
      bayan
    </text>
    
    <rect x="180" y="-2" width="15" height="2" class="cls-2" opacity="0.5"/>
  </g>
</svg>
